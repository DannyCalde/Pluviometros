<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Pluviómetros - EMPAGUA</title>
    <style>
        /* Limpiamos el diseño para que ocupe toda la pantalla */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
        }

        /* Contenedor del Formulario (La Máscara) */
        #survey-container { 
            position: absolute;
            width: 100%; 
            height: 100%; 
            z-index: 99; 
            background: white; 
        }

        /* Contenedor del Tablero (Oculto al inicio) */
        #dashboard-container { 
            width: 100%; 
            height: 100%; 
            display: none; 
        }

        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>

    <div id="survey-container">
        <iframe id="surveyFrame" 
            src="https://survey123.arcgis.com/share/TU_ID_DE_SURVEY_AQUI?hide=navbar">
        </iframe>
    </div>

    <div id="dashboard-container">
        <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
    </div>

    <script>
        // Escuchamos el evento cuando se envía el formulario
        window.addEventListener('message', function(e) {
            // Survey123 envía este mensaje al padre cuando se completa el envío
            if (e.data && (e.data === 'survey123:onFormSubmitted' || e.data.event === 'survey123:onFormSubmitted')) {
                
                console.log("Formulario enviado con éxito. Liberando tablero...");
                
                // Transición: Ocultamos el survey y mostramos el tablero
                document.getElementById('survey-container').style.display = 'none';
                document.getElementById('dashboard-container').style.display = 'block';
            }
        });
    </script>
</body>
</html>
