<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluviómetros - EMPAGUA</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #f4f4f4; }
        #survey-container { position: absolute; width: 100%; height: 100%; z-index: 100; background: white; }
        #dashboard-container { width: 100%; height: 100%; display: none; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="survey-container">
        <iframe id="surveyFrame" 
            src="https://survey123.arcgis.com/share/6fa3227ded564a7d86e99190540042e9?portalUrl=https://gis.empagua.com/portal&hide=navbar">
        </iframe>
    </div>

    <div id="dashboard-container">
        <iframe src="https://empagua.maps.arcgis.com/apps/dashboards/1db4bf42e9ca46598463e3f352fb3c6f"></iframe>
    </div>

    <script>
        window.addEventListener('message', function(e) {
            // Verificamos si el mensaje viene del Survey
            if (e.data) {
                try {
                    var t = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
                    // Si el evento es que el formulario se envió con éxito
                    if (t.event === 'survey123:onFormSubmitted') {
                        console.log("¡Éxito! Liberando tablero...");
                        document.getElementById('survey-container').style.display = 'none';
                        document.getElementById('dashboard-container').style.display = 'block';
                    }
                } catch (error) {
                    // Ignorar mensajes que no sean JSON (común en iframes)
                }
            }
        });
    </script>
</body>
</html>
